query TiposAnimal($ativo: Boolean) {
  tiposAnimal(ativo: $ativo) {
    id
    nome
    ativo
    ordem
    createdAt
  }
}

mutation CreateTipoAnimal($input: CreateTipoAnimalInput!) {
  createTipoAnimal(input: $input) {
    id
    nome
    ativo
    ordem
  }
}

mutation UpdateTipoAnimal($id: ID!, $input: UpdateTipoAnimalInput!) {
  updateTipoAnimal(id: $id, input: $input) {
    id
    nome
    ativo
    ordem
  }
}

query Racas($tipoAnimalId: String, $ativo: Boolean) {
  racas(tipoAnimalId: $tipoAnimalId, ativo: $ativo) {
    id
    nome
    ativo
    ordem
    tipoAnimalId
    tipoAnimal {
      id
      nome
    }
    createdAt
  }
}

mutation CreateRaca($input: CreateRacaInput!) {
  createRaca(input: $input) {
    id
    nome
    ativo
    ordem
    tipoAnimalId
    tipoAnimal {
      id
      nome
    }
  }
}

mutation UpdateRaca($id: ID!, $input: UpdateRacaInput!) {
  updateRaca(id: $id, input: $input) {
    id
    nome
    ativo
    ordem
    tipoAnimalId
    tipoAnimal {
      id
      nome
    }
  }
}

